<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administracion - Menu QR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/style.css">
</head>
<body>

  <div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-box">
      <div class="icon-login">
          <!--
          tags: [account, avatar, profile, role]
          version: "1.44"
          unicode: "ef68"
          category: System
          -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="70"
            height="70"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fff"
            stroke-width="1"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
            <path d="M12 10m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" />
            <path d="M6.168 18.849a4 4 0 0 1 3.832 -2.849h4a4 4 0 0 1 3.834 2.855" />
          </svg>
      </div>
      <h1>Panel de Administracion</h1>
      <label>Usuario</label>
      <input type="text" id="username" required autocomplete="username">
      <label>Contrasena</label>
      <input type="password" id="password" required autocomplete="current-password">
      <button type="submit" title="Haz clic para ingresar" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-door-enter">
        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
        <path d="M13 12v.01" />
        <path d="M3 21h18" />
        <path d="M5 21v-16a2 2 0 0 1 2 -2h6m4 10.5v7.5" />
        <path d="M21 7h-7m3 -3l-3 3l3 3" />
      </svg>
      </button>
      <p id="loginError" class="error" style="display:none;"></p>
    </form>
  </div>

  <div id="dashboard" class="dashboard">
    <header class="dash-header">
      <div class="header-left">
        <div class="menu-group">
          <button id="menuToggle" class="hamburger" aria-label="Menu" title="Menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div id="menuOverlay" class="menu-overlay"></div>
          <aside id="menuDropdown" class="sidebar-menu">
            <div class="sidebar-header">
              <strong>Menu</strong>
              <button id="closeSidebar" class="sidebar-close">✕</button>
            </div>
            <a href="/kitchen" target="_blank" class="sidebar-item">Ver cocina ↗</a>
            <div class="sidebar-spacer"></div>
            <button id="logoutBtn" class="sidebar-item danger">Salir</button>
          </aside>
        </div>
        <div class="icon-container">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-home">
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M5 12l-2 0l9 -9l9 9l-2 0" />
            <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7" />
            <path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6" />
          </svg>
        </div>
      </div>
      <div class="header-right">
        <div>
          <h1 id="restaurantTitle" class="title">Administracion</h1>
        </div>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="platos">
        <div style="display: flex; align-items: center; gap: 8px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-bowl-chopsticks">
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M4 11h16a1 1 0 0 1 1 1v.5c0 1.5 -2.517 5.573 -4 6.5v1a1 1 0 0 1 -1 1h-8a1 1 0 0 1 -1 -1v-1c-1.687 -1.054 -4 -5 -4 -6.5v-.5a1 1 0 0 1 1 -1" />
            <path d="M19 7l-14 1" />
            <path d="M19 2l-14 3" />
          </svg>
          <p>Platos</p>
        </div>
      </button>
      <button class="tab-btn" data-tab="tables">
        <div style="display: flex; align-items: center; gap: 8px;">
          <svg xmlns="http://www.w3.org/2000/svg" height="28px" viewBox="0 -960 960 960" width="28px" fill="#fff"><path d="M160-160q-33 0-56.5-23.5T80-240v-440h80v440h280v80H160Zm120-560q-33 0-56.5-23.5T200-800q0-33 23.5-56.5T280-880q33 0 56.5 23.5T360-800q0 33-23.5 56.5T280-720ZM480-80v-200H280q-33 0-56.5-23.5T200-360v-236q0-35 24-59.5t58-24.5q19 0 35.5 8t28.5 22q45 49 96.5 89.5T560-520h54q-25-17-39.5-42.5T560-620h241q0 32-14.5 57.5T747-520h133v80H720v360h-80v-360h-80q-53 0-107-23t-93-55v138h120q33 0 56.5 23.5T560-300v220h-80Z"/></svg>
          <p>Mesas y codigos QR</p>
        </div>
      </button>
    </nav>

    <div class="section-header">
      <h2 class="section-title" id="sectionTitle">Platos</h2>
      <p class="section-desc" id="sectionDesc">Gestiona categorias y los platos de cada una</p>
    </div>

    <!-- PLATOS (categorias + platos integrados) -->
    <section id="tab-platos" class="tab-panel">
      <div class="toggles-row">
        <div class="add-toggle" data-target="categoryForm">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg>
          Agregar categoria
        </div>
        <div class="add-toggle" data-target="itemForm">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg>
          Agregar plato
        </div>
      </div>
      <form id="categoryForm" class="inline-form" style="display:none;">
        <input type="text" id="categoryName" placeholder="Nombre de la categoria (ej. Entradas)" required maxlength="100">
        <button type="submit">Agregar</button>
      </form>
      <form id="itemForm" class="grid-form" style="display:none;">
        <input type="text" id="itemName" placeholder="Nombre del plato" required maxlength="150">
        <select id="itemCategory"></select>
        <input type="number" id="itemPrice" placeholder="Precio" required min="0" step="1">
        <input type="text" id="itemImage" placeholder="URL de imagen (opcional)">
        <textarea id="itemDescription" placeholder="Descripcion (opcional)" maxlength="500"></textarea>
        <button type="submit">Agregar plato</button>
      </form>
      <div id="categoriesList" class="categories-grid"></div>
    </section>

    <!-- MESAS -->
    <section id="tab-tables" class="tab-panel" style="display:none;">
      <div class="add-toggle" data-target="tableForm">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg>
        Agregar mesa
      </div>
      <form id="tableForm" class="inline-form" style="display:none;">
        <input type="text" id="tableNumber" placeholder="Numero o nombre de mesa (ej. 5)" required maxlength="20">
        <button type="submit">Crear mesa</button>
      </form>
      <div id="tablesList" class="tables-grid"></div>
    </section>
  </div>

  <script src="/admin/app.js"></script>
</body>
</html>
